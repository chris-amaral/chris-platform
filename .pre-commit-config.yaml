###############################################################################
# Pre-commit hooks — chris-platform
#
# Instalacao (uma vez por workstation):
#   pip install pre-commit
#   pre-commit install
#
# Os hooks rodam automaticamente em todo `git commit`. Para rodar manualmente
# em todos os arquivos: pre-commit run --all-files
#
# Mantenedor: chris-amaral
###############################################################################
repos:
  # --- Higiene basica do repositorio ----------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^charts/.*/templates/
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # --- Terraform -------------------------------------------------------------
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.96.2
    hooks:
      - id: terraform_fmt
      - id: terraform_validate
        args:
          - --tf-init-args=-backend=false
      - id: terraform_tflint
        args:
          - --args=--minimum-failure-severity=warning

  # --- Helm ------------------------------------------------------------------
  - repo: https://github.com/gruntwork-io/pre-commit
    rev: v0.1.25
    hooks:
      - id: helmlint

  # --- YAML / Shell ----------------------------------------------------------
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: [--strict, -d, "{rules: {line-length: {max: 200}}}"]
        exclude: ^(charts/.*/templates/|argocd/.*\.yaml$)

  - repo: https://github.com/koalaman/shellcheck-precommit
    rev: v0.10.0
    hooks:
      - id: shellcheck
        args: [-S, warning]

  # --- Secrets / vazamento ---------------------------------------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
