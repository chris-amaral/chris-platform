{{- if .Values.configMap.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "webapp.fullname" . }}-html
  labels:
    {{- include "webapp.labels" . | nindent 4 }}
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="pt-BR">
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>{{ include "webapp.fullname" . }}</title>
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
          display: flex; justify-content: center; align-items: center;
          min-height: 100vh;
          background: linear-gradient(135deg, #0a0a23 0%, #1a1a3e 50%, #2d1b69 100%);
          color: #e2e8f0;
        }
        .card {
          text-align: center; padding: 3rem 2.5rem;
          background: rgba(255,255,255,0.04);
          border-radius: 20px;
          backdrop-filter: blur(16px);
          border: 1px solid rgba(255,255,255,0.08);
          box-shadow: 0 8px 32px rgba(0,0,0,0.3);
          max-width: 550px; width: 90%;
        }
        .card h1 {
          font-size: 1.8rem; font-weight: 700;
          margin-bottom: 0.75rem;
          background: linear-gradient(90deg, #60a5fa, #a78bfa);
          -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .card p { font-size: 1rem; opacity: 0.7; line-height: 1.6; }
        .badge {
          display: inline-block; margin-top: 1.5rem;
          padding: 0.4rem 1rem; border-radius: 999px;
          background: rgba(96,165,250,0.15);
          border: 1px solid rgba(96,165,250,0.3);
          font-size: 0.8rem; color: #93c5fd;
        }
      </style>
    </head>
    <body>
      <div class="card">
        <h1>{{ .Values.customMessage }}</h1>
        <p>Deployed with Helm on Kubernetes</p>
        <span class="badge">{{ include "webapp.chart" . }}</span>
      </div>
    </body>
    </html>
{{- end }}
