###############################################################################
# webapp - Default Values
# Chart generico para deploy de aplicacoes web.
# Author: Christopher Amaral
###############################################################################

# --- Replicas ---------------------------------------------------------------
replicaCount: 1

# --- Container Image --------------------------------------------------------
# Suporta qualquer imagem. Exemplos:
#   nginx:1.27-alpine, httpd:2.4, node:20-slim, python:3.12-slim
image:
  repository: nginx
  tag: "1.27-alpine"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# --- Naming Override --------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

# --- Service ----------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  targetPort: 80

# --- Resources (CPU/Memory) ------------------------------------------------
# Sempre defina limits e requests para evitar resource starvation no cluster.
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi

# --- Custom HTML Message ----------------------------------------------------
# Mensagem exibida no index.html do Nginx.
# Pode ser sobrescrita via --set customMessage="..." no helm upgrade.
# Esta mensagem default e o texto que aparece se nada for passado pelo pipeline.
customMessage: "chris-platform - DevOps CICD by Christopher Amaral"

# --- ConfigMap (index.html) -------------------------------------------------
# Desabilite se usar imagem que ja possui seu proprio conteúdo web.
configMap:
  enabled: true

# --- Health Probes ----------------------------------------------------------
probes:
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3

# --- Autoscaling (HPA) -----------------------------------------------------
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 85

# --- Network Policy ---------------------------------------------------------
# Quando habilitado, permite apenas ingress na porta do service.
networkPolicy:
  enabled: false

# --- Self-Healing -----------------------------------------------------------
# CronJob que detecta pods em CrashLoopBackOff (ou com restartCount alto)
# e os deleta para forcar recriacao pelo controller. Reproduz, em escala
# de laboratorio, o sistema de Self-Healing que rodava no iFood/Zoop.
#
# Em producao, troque por um operator dedicado (kured, descheduler ou um
# custom com kopf/operator-sdk). Aqui o CronJob basta para demonstrar.
selfHealing:
  enabled: false
  schedule: "*/5 * * * *"          # a cada 5 min
  maxRestartsBeforeAction: 3       # acima disso, deleta o pod
  image: "bitnami/kubectl:1.30"

# --- Pod Configuration ------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
podLabels: {}

securityContext:
  runAsNonRoot: false

containerSecurityContext: {}



