###############################################################################
# webapp - Production Overrides
# Valores para ambiente de produção com alta disponibilidade.
# Uso: helm upgrade --install webapp ./charts/webapp -f values-production.yaml
# Author: Christopher Amaral
###############################################################################

replicaCount: 3

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 75

networkPolicy:
  enabled: true

probes:
  liveness:
    enabled: true
    path: /
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 5
  readiness:
    enabled: true
    path: /
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
