###############################################################################
# argocd-bootstrap.yml
#
# Workflow MANUAL para aplicar o App-of-Apps do ArgoCD na EC2.
# Executar uma unica vez por ambiente, depois que o cluster Kind ja esta
# rodando (bootstrap-cluster.sh terminou) e os GitHub Secrets do deploy
# (EC2_SSH_HOST, EC2_SSH_PRIVATE_KEY, EC2_INSTANCE_ID, AWS_ROLE_ARN) ja
# estao configurados.
#
# A ideia desse workflow e separar o "ato fundador" do GitOps (entregar
# os manifestos ArgoCD ao cluster pela primeira vez) do deploy continuo
# da aplicacao, que e feito pelo `ci-deploy-k8s.yml` ou pelo proprio
# ArgoCD reconciliando o repositorio.
#
# Mantenedor: Christopher Amaral
###############################################################################
name: ArgoCD - Bootstrap (manual)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Ambiente alvo"
        required: true
        default: "dev"
        type: choice
        options: [dev, homol, prod]

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  apply:
    name: Aplicar manifestos ArgoCD na EC2
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: AWS OIDC Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copiar manifestos para a EC2
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            argocd ubuntu@${{ secrets.EC2_SSH_HOST }}:/tmp/argocd

      - name: Instalar ArgoCD se ausente + aplicar manifestos
        # Idempotente: se ArgoCD ja existe, o install.sh e no-op nos passos
        # que aplicam manifests (kubectl apply --dry-run + apply); se nao
        # existe, instala do zero. Resolve o caso da EC2 ter sido provisionada
        # ANTES do bootstrap-cluster.sh ter o passo de ArgoCD.
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_SSH_HOST }} << 'EOF'
          set -e
          export PATH="$PATH:/usr/local/bin"

          # 1) Garantir que ArgoCD esta instalado
          if ! kubectl get namespace argocd >/dev/null 2>&1 \
              || [ "$(kubectl -n argocd get deploy 2>/dev/null | wc -l)" -lt 2 ]; then
            echo "ArgoCD ausente na EC2. Rodando /tmp/argocd/install.sh..."
            chmod +x /tmp/argocd/install.sh
            bash /tmp/argocd/install.sh
          else
            echo "ArgoCD ja presente. Aplicando apenas os manifestos."
            kubectl -n argocd wait --for=condition=available deployment --all --timeout=5m
            kubectl apply -f /tmp/argocd/projects/chris-platform.yaml
            kubectl apply -f /tmp/argocd/applications/webapp.yaml
          fi

          echo ""
          echo "=== ArgoCD Applications ==="
          kubectl -n argocd get applications.argoproj.io -o wide || true

          echo ""
          echo "=== Senha admin inicial (so existe na primeira instalacao) ==="
          kubectl -n argocd get secret argocd-initial-admin-secret \
            -o jsonpath='{.data.password}' 2>/dev/null \
            | base64 -d || echo "(secret ja foi rotacionado ou sem permissao)"

          rm -rf /tmp/argocd
          EOF
