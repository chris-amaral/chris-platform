###############################################################################
# cost-report.yml
#
# DEMO / MANUAL APENAS — schedule diario foi desativado intencionalmente.
#
# Este workflow existe como demonstracao de como reproduzir, em escala de
# laboratorio, o tipo de automacao operacional em Python que rodava nas
# pipelines da equipe em que atuei (banco de varejo com grande escalabilidade
# na America Latina): scripts curtos, autenticados via OIDC, com saida
# estruturada que outros sistemas conseguem consumir.
#
# Como executar manualmente:
#   gh workflow run "AWS - Daily Cost Report" -f days=7
# Ou via UI: Actions -> "AWS - Daily Cost Report" -> "Run workflow".
#
# Para reativar o schedule diario, descomentar o bloco `schedule:` abaixo.
#
# Mantenedor: chris-amaral
###############################################################################
name: AWS - Daily Cost Report

on:
  # schedule:
  #   - cron: "0 9 * * *"   # 09:00 UTC = 06:00 BRT — desativado intencionalmente
  workflow_dispatch:
    inputs:
      days:
        description: "Janela em dias"
        required: false
        default: "7"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  report:
    name: Cost Explorer report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: AWS OIDC Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Gerar relatorio
        run: |
          python scripts/aws_cost_report.py \
            --days ${{ inputs.days || 7 }} \
            --tag-key Project \
            --output cost-report.json

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cost-report-${{ github.run_id }}
          path: cost-report.json
          retention-days: 30
