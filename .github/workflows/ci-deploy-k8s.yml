name: CI/CD - Deploy K8s

on:
  push:
    branches: [main, develop, "feature/**", "release/**", "hotfix/**"]
    paths:
      - "charts/**"
      - ".github/workflows/ci-deploy-k8s.yml"
      - "terraform/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "charts/**"
      - "terraform/**"

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  CHART_PATH: ./charts/webapp
  RELEASE_NAME: webapp

jobs:
  lint:
    name: Helm Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.0

      - name: Lint (strict)
        run: helm lint ${{ env.CHART_PATH }} --strict

      - name: Template dry-run (default)
        run: helm template ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} --debug > /dev/null

      - name: Template dry-run (production)
        run: helm template ${{ env.RELEASE_NAME }} ${{ env.CHART_PATH }} -f ${{ env.CHART_PATH }}/values-production.yaml --debug > /dev/null

  security-scan:
    name: Trivy - Vulnerability Scan
    runs-on: ubuntu-latest
    needs: lint
    # Permissoes minimas para o codeql-action/upload-sarif funcionar:
    #   contents: read         — checkout
    #   security-events: write — publicar SARIF em "Security > Code scanning"
    #   actions: read          — a action consulta o run atual (telemetria + correlation)
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Trivy - scan da imagem nginx (SARIF + tabela)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "nginx:1.27-alpine"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "sarif"
          output: "trivy-image.sarif"

      - name: Trivy - scan IaC (Terraform + manifests Helm/Argo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "config"
          scan-ref: "."
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          format: "sarif"
          output: "trivy-config.sarif"

      # Tabela legivel direto no log da Action (independente de Code Scanning).
      # Roda mesmo se o SARIF upload abaixo falhar — assim a evidencia de scan
      # vai sempre aparecer em algum lugar.
      - name: Trivy - imprimir resumo no log
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "nginx:1.27-alpine"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
          format: "table"

      # Upload para "Security > Code scanning". Em repo privado SEM GitHub
      # Advanced Security, o endpoint retorna 403 — por isso continue-on-error.
      # No repo publico (ou privado com GHAS), os achados aparecem em Security.
      - name: Upload SARIF da imagem (Code Scanning)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload SARIF do IaC (Code Scanning)
        if: always()
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # Fallback resiliente: SARIF como artifact da run, util quando Code
      # Scanning nao esta habilitado no repo.
      - name: Upload SARIF como artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ github.run_id }}
          path: |
            trivy-image.sarif
            trivy-config.sarif
          retention-days: 30

  deploy:
    name: Deploy (dev)
    runs-on: ubuntu-latest
    needs: [lint, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: AWS OIDC Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: EC2 Health Check
        run: |
          aws ec2 wait instance-status-ok \
            --instance-ids ${{ secrets.EC2_INSTANCE_ID }} \
            --region ${{ env.AWS_REGION }}

      - name: Copy chart to EC2
        run: |
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -r \
            ${{ env.CHART_PATH }} \
            ubuntu@${{ secrets.EC2_SSH_HOST }}:/tmp/webapp-chart

      - name: Helm deploy
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          DEPLOY_MSG="chris-platform - Deploy via GitHub Actions por Christopher Amaral (Commit: ${SHORT_SHA})"

          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_SSH_HOST }} << EOF
          set -e
          kubectl get nodes
          helm upgrade --install ${{ env.RELEASE_NAME }} /tmp/webapp-chart \
            --set customMessage="${DEPLOY_MSG}" \
            --set image.repository=nginx \
            --set image.tag=1.27-alpine \
            --wait --timeout 120s --force
          kubectl get pods -l app.kubernetes.io/instance=${{ env.RELEASE_NAME }} -o wide
          kubectl get svc ${{ env.RELEASE_NAME }}
          rm -rf /tmp/webapp-chart
          EOF

      - name: Smoke test
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_SSH_HOST }} << 'EOF'
          POD=$(kubectl get pods -l app.kubernetes.io/instance=webapp -o jsonpath='{.items[0].metadata.name}')
          kubectl exec $POD -- curl -sf http://localhost:80 | head -5
          EOF

      - name: Summary
        if: always()
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_SSH_HOST }} << 'EOF'
          echo "=== Releases ==="
          helm list
          echo ""
          echo "=== Pods ==="
          kubectl get pods -o wide
          echo ""
          echo "=== Services ==="
          kubectl get svc
          EOF
